<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGNAL LOST // NyayFauj</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', monospace;
      background: #050606;
      color: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      overflow: hidden;
    }
    .glitch { font-size: 5rem; margin-bottom: 2rem; position: relative; }
    .glitch::after { content: '📡'; position: absolute; top: 0; left: 0; opacity: 0.5; animation: glitch 0.2s infinite; }
    h1 { font-size: 1.5rem; font-weight: 900; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.2em; italic: true; }
    p { color: #71717a; font-size: 0.8rem; line-height: 1.8; max-width: 320px; margin-bottom: 3rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.1em; }
    .retry-btn {
      background: #dc2626;
      color: white;
      border: none;
      padding: 1.25rem 3rem;
      border-radius: 0;
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 10px 30px rgba(220, 38, 38, 0.3);
    }
    .retry-btn:active { transform: scale(0.95); }
    .retry-btn:hover { background: #ef4444; }
    .status { margin-top: 3rem; font-size: 0.7rem; color: #3f3f46; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; }
    .pulse { animation: pulse 1s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
  </style>
</head>
<body>
  <div class="glitch">📡</div>
  <h1>Signal Lost</h1>
  <p>Telemetry interrupted. Node is currently disconnected from the central intelligence network. Re-establish uplink to continue.</p>
  <button class="retry-btn" onclick="window.location.reload()">
    Re-establish Uplink
  </button>
  <div class="status pulse">
    Searching for encrypted carrier wave…
  </div>
  <script>
    window.addEventListener('online', () => { window.location.reload(); });
  </script>
</body>
</html>
